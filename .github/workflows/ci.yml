name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    name: Unit tests (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby: ["3.2", "3.3", "3.4", "4.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Compile native tools
        run: |
          mkdir -p build
          cc -O2 -o build/stub data/ext/stub.c
          cc -O2 -o build/write-footer data/ext/write-footer.c
      - name: CLI tests
        run: |
          ruby -Ilib exe/rubox --version
          ruby -Ilib exe/rubox --help
      - name: Detector tests
        run: |
          ruby -Ilib -e '
            require "rubox/detector"
            d = Rubox::Detector.new("test/gemfile-app")
            raise "no gemfile" unless d.gemfile_path
            raise "no version" unless d.ruby_version
            puts "OK: detector"
          '
      - name: Platform tests
        run: |
          ruby -Ilib -e '
            require "rubox/platform"
            raise unless Rubox::Platform.host_target.include?("-")
            raise unless Rubox::Platform.valid_target?("aarch64-linux")
            raise if Rubox::Platform.valid_target?("potato-bsd")
            puts "OK: platform"
          '
      - name: Footer round-trip
        run: |
          dd if=/dev/zero bs=1 count=100 of=/tmp/test-bin 2>/dev/null
          build/write-footer /tmp/test-bin 100 5000
          SIZE=$(stat -c%s /tmp/test-bin)
          [ "$SIZE" = "124" ] && echo "OK: footer" || exit 1
      - name: Gem builds
        run: gem build rubox.gemspec

  test-package-linux:
    name: Package herb (Ruby ${{ matrix.ruby_version }}, Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby_version: "3.4.2"
            arch: x86_64
            runner: ubuntu-latest
          - ruby_version: "3.4.2"
            arch: aarch64
            runner: ubuntu-24.04-arm
          - ruby_version: "4.0.0"
            arch: x86_64
            runner: ubuntu-latest
          - ruby_version: "4.0.0"
            arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - name: Build static Ruby ${{ matrix.ruby_version }}
        run: |
          RUBOX_DATA_DIR=$PWD/data data/scripts/build-ruby.sh \
            --ruby-version ${{ matrix.ruby_version }} \
            --target ${{ matrix.arch }}-linux \
            --output build/ruby
        timeout-minutes: 15
      - name: Install herb
        run: build/ruby/bin/gem install herb --no-document
      - name: Package
        run: |
          mkdir -p build
          cc -O2 -static -o build/stub data/ext/stub.c
          cc -O2 -static -o build/write-footer data/ext/write-footer.c
          RUBOX_DATA_DIR=$PWD/data data/scripts/package.sh \
            --ruby-dir build/ruby \
            --gem herb --entry herb \
            --stub build/stub \
            --output build/herb
      - name: Test binary
        run: |
          build/herb --version
          echo '<div><%= x %></div>' | build/herb parse -
      - name: Test on Ubuntu
        run: docker run --rm -v $PWD/build:/app ubuntu:24.04 /app/herb --version
      - name: Test on Debian
        run: docker run --rm -v $PWD/build:/app debian:12 /app/herb --version
      - name: Test on Alpine
        run: docker run --rm -v $PWD/build:/app alpine:3.21 /app/herb --version

  test-package-macos:
    name: Package herb (Ruby ${{ matrix.ruby_version }}, macOS arm64)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        ruby_version: ["3.4.2", "4.0.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - name: Install static libs
        run: brew install openssl@3 libyaml libffi zlib readline
      - name: Build static Ruby ${{ matrix.ruby_version }}
        run: |
          RUBOX_DATA_DIR=$PWD/data data/scripts/build-ruby.sh \
            --ruby-version ${{ matrix.ruby_version }} \
            --target aarch64-darwin \
            --output build/ruby
        timeout-minutes: 10
      - name: Install herb
        run: build/ruby/bin/gem install herb --no-document
      - name: Package
        run: |
          mkdir -p build
          cc -O2 -o build/stub data/ext/stub.c
          cc -O2 -o build/write-footer data/ext/write-footer.c
          RUBOX_DATA_DIR=$PWD/data data/scripts/package.sh \
            --ruby-dir build/ruby \
            --gem herb --entry herb \
            --stub build/stub \
            --output build/herb
      - name: Test binary
        run: |
          build/herb --version
          echo '<div><%= x %></div>' | build/herb parse -
